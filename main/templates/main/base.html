<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Магазин{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f5f5f5;
        }

        header {
            background: #222;
            color: white;
            padding: 20px;
        }

        header a {
            color: white;
            text-decoration: none;
            margin-right: 15px;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: 20px auto;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .product-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 10px;
        }

        .btn {
            display: inline-block;
            background: #007bff;
            color: white;
            padding: 10px 16px;
            text-decoration: none;
            border-radius: 6px;
            margin-top: 10px;
        }

        .btn-disabled {
            display: inline-block;
            background: gray;
            color: white;
            padding: 10px 16px;
            border-radius: 6px;
            margin-top: 10px;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .category-link {
            display: inline-block;
            margin-right: 10px;
            margin-bottom: 10px;
            padding: 8px 12px;
            background: #e9ecef;
            border-radius: 6px;
            text-decoration: none;
            color: black;
        }
    </style>
</head>
<body>

<header>
    <a href="{% url 'home' %}">Головна</a>
</header>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
